<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabii — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141716;
    --surface2: #1c1f1d;
    --border: #2a2e2b;
    --border2: #363b37;
    --text: #e8ede9;
    --text2: #8a9189;
    --text3: #4d524e;
    --accent: #a8e63d;
    --accent2: #7ab82a;
    --accent-dim: rgba(168,230,61,0.08);
    --accent-dim2: rgba(168,230,61,0.15);
    --blue: #4da6ff;
    --blue-dim: rgba(77,166,255,0.1);
    --amber: #f0a842;
    --amber-dim: rgba(240,168,66,0.1);
    --red: #ff6b6b;
    --red-dim: rgba(255,107,107,0.1);
    --teal: #3dd9c4;
    --teal-dim: rgba(61,217,196,0.1);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
  }
  .logo span { color: var(--accent); }
  .topbar-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-export {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 7px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    padding: 24px 0;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 28px;
  }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
  }
  .week-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-label-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    flex: 1;
    text-align: center;
    line-height: 1.3;
  }
  .day-list { display: flex; flex-direction: column; gap: 2px; }
  .day-item {
    padding: 9px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .day-item:hover { background: var(--surface); }
  .day-item.active { background: var(--accent-dim2); }
  .day-item.active .day-name { color: var(--accent); }
  .day-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }
  .day-type-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-strength { background: var(--blue); }
  .dot-cardio { background: var(--teal); }
  .dot-power { background: var(--amber); }
  .dot-recovery { background: var(--text3); }
  .day-logged-mark {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    right: 8px;
    top: 8px;
  }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
  }
  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }

  .session-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .session-title-block .session-day {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .session-title-block .session-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .session-title-block .session-focus {
    font-size: 13px;
    color: var(--text2);
  }
  .session-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .badge-strength { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(77,166,255,0.2); }
  .badge-cardio { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(61,217,196,0.2); }
  .badge-power { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,168,66,0.2); }
  .badge-recovery { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

  /* EXERCISES */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 12px;
  }
  .ex-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .ex-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .ex-spec {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
  }
  .ex-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-left: 12px;
  }
  .icon-strength { background: var(--blue-dim); }
  .icon-cardio { background: var(--teal-dim); }
  .icon-power { background: var(--amber-dim); }

  /* SET INPUTS */
  .sets-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .set-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    min-width: 100px;
    flex: 1;
  }
  .set-block-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .set-inputs-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 6px 8px;
    width: 58px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-input-unit {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }

  /* CARDIO */
  .cardio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
  }
  .cardio-field {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .cardio-field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }
  .cardio-field input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    width: 100%;
    outline: none;
    font-weight: 500;
  }
  .cardio-field input::placeholder { color: var(--text3); }

  /* INTERVALS */
  .interval-table { width: 100%; border-collapse: collapse; }
  .interval-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: left;
    padding: 0 8px 8px 0;
    font-weight: 400;
  }
  .interval-table td { padding: 3px 8px 3px 0; }
  .interval-table td:first-child {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    width: 30px;
  }
  .interval-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 5px 8px;
    width: 90px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  .interval-input:focus { border-color: var(--accent); }

  /* RPE + NOTES */
  .bottom-row {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 12px;
    margin-top: 12px;
  }
  .rpe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .rpe-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .rpe-display {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 12px;
    line-height: 1;
  }
  .rpe-display span { font-size: 16px; color: var(--text3); }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    height: 4px;
  }
  .notes-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .notes-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .notes-card textarea {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    width: 100%;
    resize: none;
    outline: none;
    line-height: 1.6;
    color: var(--text2);
  }
  .notes-card textarea::placeholder { color: var(--text3); }

  /* SAVE BTN */
  .save-section {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-save {
    background: var(--accent);
    color: #0d0f0e;
    border: none;
    border-radius: var(--radius);
    padding: 12px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-save:hover { background: #c4f55a; }
  .btn-save:active { transform: scale(0.98); }
  .toast {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* HISTORY */
  .history-section { margin-top: 32px; }
  .history-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 12px;
    align-items: start;
  }
  .history-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .history-content { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .history-rpe {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }
  .history-empty {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    padding: 20px 0;
  }

  /* PR BADGE */
  .pr {
    display: inline-block;
    background: var(--amber-dim);
    color: var(--amber);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    letter-spacing: 0.05em;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { width: 180px; }
    .main { padding: 20px; }
    .bottom-row { grid-template-columns: 1fr; }
    .topbar { padding: 16px 20px; }
  }
  @media (max-width: 560px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
    .day-list { flex-direction: row; flex-wrap: wrap; }
    .day-item { flex: 1; min-width: 80px; justify-content: center; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>R</span> / Workout Log</div>
  <div class="topbar-right">
    <button class="btn-export" onclick="exportCSV()">Export CSV</button>
    <button class="btn-export" onclick="exportJSON()">Backup JSON</button>
    <button class="btn-export" onclick="importJSON()">Restore</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Week</div>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWeek(-1)">‹</button>
        <div class="week-label-text" id="week-label"></div>
        <button class="week-btn" onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Session</div>
      <div class="day-list" id="day-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Stats</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="s1">0</div><div class="stat-lbl">This week</div></div>
        <div class="stat-box"><div class="stat-val" id="s2">0</div><div class="stat-lbl">All time</div></div>
        <div class="stat-box" style="grid-column:1/-1"><div class="stat-val" id="s3">0</div><div class="stat-lbl">Day streak</div></div>
      </div>
    </div>
  </div>

  <div class="main" id="main-content"></div>
</div>

<script>

      {name:'🧊 COOLDOWN — Sleeper Stretch', spec:'2×30 sec each side · lie on side, bottom arm at 90° · gently press wrist toward floor · shoulder health after rows & cleans', sets:2, type:'timed'},
      {name:'🧊 COOLDOWN — Thoracic Extension over Roller', spec:'30 sec at 3 positions: lower / mid / upper thoracic · arms crossed on chest · extend over roller, breathe out · spinal decompression after heavy pulls', sets:3, type:'timed'}

  6: { name:'Saturday', short:'Sat', type:'recovery', badge:'badge-recovery', icon:'🧘',
    title:'Active Recovery', focus:'Systemic recovery — zero intensity',
    exercises:[
      {name:'Light Walk or Mobility', spec:'30 min walk or 15 min stretching · CNS reset for Sunday', type:'recovery'}
    ]}
};

const DOT_CLASS = { strength:'dot-strength', cardio:'dot-cardio', power:'dot-power', recovery:'dot-recovery' };

let weekOffset = 0;
let activeDay = new Date().getDay();
let db = JSON.parse(localStorage.getItem('rabii_wt_v2') || '{}');

function save() { localStorage.setItem('rabii_wt_v2', JSON.stringify(db)); }

function getDateKey(dow, wOff) {
  const d = new Date();
  const diff = d.getDay() - dow + (wOff * 7);
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0,10);
}

function getWeekDates(wOff) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + (wOff * 7));
  const end = new Date(d); end.setDate(end.getDate() + 6);
  const fmt = x => x.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  let label = wOff === 0 ? 'This week' : wOff === -1 ? 'Last week' : fmt(d);
  return label + '\n' + fmt(d) + '–' + fmt(end);
}

function changeWeek(dir) { weekOffset += dir; renderSidebar(); renderMain(); }

function renderSidebar() {
  document.getElementById('week-label').textContent = getWeekDates(weekOffset);
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const p = PROGRAM[i];
    const dk = getDateKey(i, weekOffset);
    const logged = db[dk]?.saved;
    const div = document.createElement('div');
    div.className = 'day-item' + (i === activeDay ? ' active' : '');
    div.innerHTML = `<span class="day-name">${p.short}</span><span class="day-type-dot ${DOT_CLASS[p.type]}"></span>${logged ? '<span class="day-logged-mark"></span>' : ''}`;
    div.onclick = () => { activeDay = i; renderSidebar(); renderMain(); };
    list.appendChild(div);
  }
  updateStats();
}

function updateStats() {
  const allKeys = Object.keys(db).filter(k => db[k]?.saved);
  // this week
  const wStart = new Date(); wStart.setDate(wStart.getDate() - wStart.getDay() + (weekOffset * 7)); wStart.setHours(0,0,0,0);
  const wEnd = new Date(wStart); wEnd.setDate(wEnd.getDate() + 7);
  const thisWeek = allKeys.filter(k => { const d = new Date(k); return d >= wStart && d < wEnd; });
  document.getElementById('s1').textContent = thisWeek.length;
  document.getElementById('s2').textContent = allKeys.length;
  // streak
  let streak = 0, check = new Date();
  for (let i = 0; i < 90; i++) {
    const k = check.toISOString().slice(0,10);
    if (db[k]?.saved) streak++;
    check.setDate(check.getDate() - 1);
  }
  document.getElementById('s3').textContent = streak;
}

function renderMain() {
  const p = PROGRAM[activeDay];
  const dk = getDateKey(activeDay, weekOffset);
  const saved = db[dk] || {};
  const mc = document.getElementById('main-content');

  let html = `<div class="session-header">
    <div class="session-title-block">
      <div class="session-day">${p.name} · ${new Date(dk + 'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
      <div class="session-name">${p.title}</div>
      <div class="session-focus">${p.focus}</div>
    </div>
    <span class="session-badge ${p.badge}">${p.type}</span>
  </div>`;

  p.exercises.forEach((ex, ei) => {
    const iconClass = ex.type.includes('cardio') ? 'icon-cardio' : ex.type === 'recovery' ? '' : ex.type === 'timed' ? 'icon-power' : 'icon-strength';
    html += `<div class="exercise-card">
      <div class="ex-header">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-spec">${ex.spec}</div>
        </div>
        <div class="ex-icon ${iconClass}">${p.icon}</div>
      </div>`;

    if (ex.type === 'strength' || ex.type === 'amrap') {
      html += `<div class="sets-row">`;
      for (let s = 0; s < ex.sets; s++) {
        const sv = saved[`${ei}_${s}`] || {};
        const isAmrap = ex.type === 'amrap';
        html += `<div class="set-block">
          <div class="set-block-label">Set ${s+1}</div>
          <div class="set-inputs-row">
            ${!isAmrap ? `<input class="set-input" type="number" placeholder="kg" min="0" step="2.5" value="${sv.kg||''}" id="i_${ei}_${s}_kg">` : ''}
            <input class="set-input" type="number" placeholder="reps" min="0" value="${sv.reps||''}" id="i_${ei}_${s}_reps">
            <span class="set-input-unit">${isAmrap ? 'reps' : '× kg'}</span>
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    if (ex.type === 'timed') {
      html += `<div class="sets-row">`;
      for (let s = 0; s < ex.sets; s++) {
        const sv = saved[`${ei}_${s}`] || {};
        html += `<div class="set-block">
          <div class="set-block-label">Set ${s+1}</div>
          <div class="set-inputs-row">
            <input class="set-input" type="number" placeholder="kg" min="0" value="${sv.kg||''}" id="i_${ei}_${s}_kg">
            <input class="set-input" type="number" placeholder="sec" min="0" value="${sv.reps||''}" id="i_${ei}_${s}_reps">
            <span class="set-input-unit">kg·s</span>
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    if (ex.type === 'cardio-row-steady') {
      const c = saved[`${ei}_c`] || {};
      html += `<div class="cardio-grid">
        <div class="cardio-field"><label>Duration (min)</label><input id="i_${ei}_dur" type="number" placeholder="28" value="${c.dur||''}"></div>
        <div class="cardio-field"><label>Distance (m)</label><input id="i_${ei}_dist" type="number" placeholder="6000" value="${c.dist||''}"></div>
        <div class="cardio-field"><label>Split /500m</label><input id="i_${ei}_split" type="text" placeholder="2:16" value="${c.split||''}"></div>
        <div class="cardio-field"><label>Stroke rate (SPM)</label><input id="i_${ei}_spm" type="number" placeholder="22" value="${c.spm||''}"></div>
        <div class="cardio-field"><label>Watts</label><input id="i_${ei}_watts" type="number" placeholder="130" value="${c.watts||''}"></div>
        <div class="cardio-field"><label>Calories</label><input id="i_${ei}_cal" type="number" placeholder="300" value="${c.cal||''}"></div>
      </div>`;
    }

    if (ex.type === 'cardio-run') {
      const c = saved[`${ei}_c`] || {};
      html += `<div class="cardio-grid">
        <div class="cardio-field"><label>Distance (km)</label><input id="i_${ei}_dist" type="number" step="0.1" placeholder="4.0" value="${c.dist||''}"></div>
        <div class="cardio-field"><label>Duration (min)</label><input id="i_${ei}_dur" type="number" placeholder="25" value="${c.dur||''}"></div>
        <div class="cardio-field"><label>Avg pace (min/km)</label><input id="i_${ei}_pace" type="text" placeholder="5:30" value="${c.pace||''}"></div>
        <div class="cardio-field"><label>Heart rate (avg)</label><input id="i_${ei}_hr" type="number" placeholder="138" value="${c.hr||''}"></div>
      </div>`;
    }

    if (ex.type === 'cardio-intervals') {
      const ivs = saved[`${ei}_ivs`] || [];
      const rows = Math.max(6, ivs.length + 1);
      html += `<table class="interval-table">
        <thead><tr><th>#</th><th>Split (m:ss)</th><th>Stroke rate</th><th>Watts</th><th>RPE</th></tr></thead>
        <tbody>`;
      for (let r = 0; r < rows; r++) {
        const iv = ivs[r] || {};
        html += `<tr>
          <td>${r+1}</td>
          <td><input class="interval-input" id="i_${ei}_iv${r}_split" type="text" placeholder="1:45" value="${iv.split||''}"></td>
          <td><input class="interval-input" id="i_${ei}_iv${r}_spm" type="number" placeholder="28" value="${iv.spm||''}"></td>
          <td><input class="interval-input" id="i_${ei}_iv${r}_watts" type="number" placeholder="180" value="${iv.watts||''}"></td>
          <td><input class="interval-input" style="width:60px" id="i_${ei}_iv${r}_rpe" type="number" min="1" max="10" placeholder="8" value="${iv.rpe||''}"></td>
        </tr>`;
      }
      html += `</tbody></table>`;
    }

    if (ex.type === 'recovery') {
      const c = saved[`${ei}_c`] || {};
      html += `<div class="cardio-grid">
        <div class="cardio-field"><label>Activity</label><input id="i_${ei}_act" type="text" placeholder="walk / mobility" value="${c.act||''}"></div>
        <div class="cardio-field"><label>Duration (min)</label><input id="i_${ei}_dur" type="number" placeholder="30" value="${c.dur||''}"></div>
        <div class="cardio-field"><label>How it felt</label><input id="i_${ei}_feel" type="text" placeholder="notes" value="${c.feel||''}"></div>
      </div>`;
    }

    html += `</div>`;
  });

  const rpe = saved.rpe || 7;
  html += `<div class="bottom-row">
    <div class="rpe-card">
      <div class="rpe-label">Session RPE</div>
      <div class="rpe-display" id="rpe-disp">${rpe}<span>/10</span></div>
      <input type="range" min="1" max="10" step="1" value="${rpe}" id="rpe-slider" oninput="document.getElementById('rpe-disp').innerHTML=this.value+'<span>/10</span>'">
    </div>
    <div class="notes-card">
      <div class="notes-label">Session notes</div>
      <textarea id="session-notes" rows="5" placeholder="Energy, sleep quality, form cues, PRs, anything notable...">${saved.notes||''}</textarea>
    </div>
  </div>`;

  html += `<div class="save-section">
    <button class="btn-save" onclick="saveSession()">Save Session</button>
    <span class="toast" id="toast">✓ Saved</span>
  </div>`;

  // History
  const history = [];
  for (let w = -1; w >= -12; w--) {
    const hdk = getDateKey(activeDay, w);
    if (db[hdk]?.saved) history.push({ key: hdk, data: db[hdk] });
  }

  html += `<div class="history-section">
    <div class="history-title">Previous ${PROGRAM[activeDay].short} sessions</div>`;

  if (history.length === 0) {
    html += `<div class="history-empty">No previous logs for ${PROGRAM[activeDay].name} yet — this will be your baseline.</div>`;
  } else {
    history.slice(0,5).forEach(h => {
      const d = new Date(h.key + 'T12:00:00');
      const dateStr = d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
      let summary = buildHistorySummary(h.data, activeDay);
      html += `<div class="history-entry">
        <div class="history-date">${dateStr}</div>
        <div class="history-content">${summary}${h.data.notes ? `<br><em style="color:var(--text3);font-size:12px">${h.data.notes}</em>` : ''}</div>
        <div class="history-rpe">RPE ${h.data.rpe||'–'}</div>
      </div>`;
    });
  }
  html += `</div>`;

  mc.innerHTML = html;
}

function buildHistorySummary(data, dow) {
  const p = PROGRAM[dow];
  const parts = [];
  p.exercises.forEach((ex, ei) => {
    if ((ex.type === 'strength' || ex.type === 'amrap') && data[`${ei}_0`]) {
      const s0 = data[`${ei}_0`];
      if (s0.kg || s0.reps) {
        const short = ex.name.split(' ').slice(-1)[0];
        parts.push(`${short}: ${s0.kg ? s0.kg+'kg' : ''}${s0.reps ? ' ×'+s0.reps : ''}`);
      }
    }
    if (ex.type === 'cardio-row-steady' && data[`${ei}_c`]) {
      const c = data[`${ei}_c`];
      if (c.dist) parts.push(`${c.dist}m in ${c.dur||'?'}min @ ${c.split||'?'}/500m`);
    }
    if (ex.type === 'cardio-run' && data[`${ei}_c`]) {
      const c = data[`${ei}_c`];
      if (c.dist) parts.push(`${c.dist}km @ ${c.pace||'?'}/km`);
    }
    if (ex.type === 'cardio-intervals' && data[`${ei}_ivs`]) {
      const ivs = data[`${ei}_ivs`].filter(iv => iv.split);
      if (ivs.length) parts.push(`${ivs.length} intervals, avg split ${avgSplit(ivs)}`);
    }
  });
  return parts.join(' · ') || 'Session logged';
}

function avgSplit(ivs) {
  const valid = ivs.filter(iv => iv.split && iv.split.includes(':'));
  if (!valid.length) return '–';
  const secs = valid.map(iv => {
    const [m, s] = iv.split.split(':').map(Number);
    return m * 60 + s;
  });
  const avg = Math.round(secs.reduce((a,b)=>a+b,0) / secs.length);
  return `${Math.floor(avg/60)}:${String(avg%60).padStart(2,'0')}`;
}

function saveSession() {
  const p = PROGRAM[activeDay];
  const dk = getDateKey(activeDay, weekOffset);
  const entry = { saved: true, date: dk, rpe: document.getElementById('rpe-slider').value, notes: document.getElementById('session-notes').value };

  p.exercises.forEach((ex, ei) => {
    if (ex.type === 'strength' || ex.type === 'amrap' || ex.type === 'timed') {
      for (let s = 0; s < ex.sets; s++) {
        const kg = document.getElementById(`i_${ei}_${s}_kg`);
        const reps = document.getElementById(`i_${ei}_${s}_reps`);
        entry[`${ei}_${s}`] = { kg: kg?.value || '', reps: reps?.value || '' };
      }
    }
    if (ex.type === 'cardio-row-steady') {
      entry[`${ei}_c`] = {
        dur: document.getElementById(`i_${ei}_dur`)?.value||'',
        dist: document.getElementById(`i_${ei}_dist`)?.value||'',
        split: document.getElementById(`i_${ei}_split`)?.value||'',
        spm: document.getElementById(`i_${ei}_spm`)?.value||'',
        watts: document.getElementById(`i_${ei}_watts`)?.value||'',
        cal: document.getElementById(`i_${ei}_cal`)?.value||''
      };
    }
    if (ex.type === 'cardio-run') {
      entry[`${ei}_c`] = {
        dist: document.getElementById(`i_${ei}_dist`)?.value||'',
        dur: document.getElementById(`i_${ei}_dur`)?.value||'',
        pace: document.getElementById(`i_${ei}_pace`)?.value||'',
        hr: document.getElementById(`i_${ei}_hr`)?.value||''
      };
    }
    if (ex.type === 'cardio-intervals') {
      const ivs = [];
      for (let r = 0; r < 10; r++) {
        const sp = document.getElementById(`i_${ei}_iv${r}_split`);
        if (!sp) break;
        const obj = { split: sp.value, spm: document.getElementById(`i_${ei}_iv${r}_spm`)?.value||'', watts: document.getElementById(`i_${ei}_iv${r}_watts`)?.value||'', rpe: document.getElementById(`i_${ei}_iv${r}_rpe`)?.value||'' };
        if (obj.split || obj.spm || obj.watts) ivs.push(obj);
      }
      entry[`${ei}_ivs`] = ivs;
    }
    if (ex.type === 'recovery') {
      entry[`${ei}_c`] = {
        act: document.getElementById(`i_${ei}_act`)?.value||'',
        dur: document.getElementById(`i_${ei}_dur`)?.value||'',
        feel: document.getElementById(`i_${ei}_feel`)?.value||''
      };
    }
  });

  db[dk] = entry;
  save();
  renderSidebar();

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function exportCSV() {
  const rows = [['Date','Day','Exercise','Set','KG','Reps/Time','Cardio Detail','RPE','Notes']];
  Object.entries(db).sort().forEach(([dk, data]) => {
    if (!data.saved) return;
    const dow = new Date(dk + 'T12:00:00').getDay();
    const p = PROGRAM[dow];
    p.exercises.forEach((ex, ei) => {
      if (ex.type === 'strength' || ex.type === 'amrap' || ex.type === 'timed') {
        for (let s = 0; s < ex.sets; s++) {
          const sv = data[`${ei}_${s}`] || {};
          rows.push([dk, p.name, ex.name, s+1, sv.kg||'', sv.reps||'', '', data.rpe||'', s===0 ? (data.notes||'') : '']);
        }
      } else {
        const c = data[`${ei}_c`] || {};
        const ivs = data[`${ei}_ivs`] || [];
        const detail = ivs.length ? `${ivs.length} intervals` : Object.values(c).filter(Boolean).join(' | ');
        rows.push([dk, p.name, ex.name, '', '', '', detail, data.rpe||'', data.notes||'']);
      }
    });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `rabii_workouts_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function exportJSON() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(db, null, 2));
  a.download = `rabii_workouts_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON() { document.getElementById('import-file').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      db = { ...db, ...data };
      save();
      renderSidebar();
      renderMain();
      alert('Data restored successfully.');
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file);
}

// INIT
renderSidebar();
renderMain();
</script>
</body>
</html>
